<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}sandbox.watch{% endblock %}</title>
    <meta
      name="description"
      content="Side-by-side specs for the cloud sandboxes that run AI agents' code, with sources for every claim."
    />
    <link rel="stylesheet" href="/static/style.css" />
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <header class="nav">
      <a class="wordmark" href="/">
        <svg class="logo" viewBox="0 0 64 64" aria-hidden="true">
          <path
            d="M26 38 V20 Q26 12 34 12 H40"
            fill="none"
            stroke="var(--fg)"
            stroke-width="7"
            stroke-linecap="round"
          />
          <circle cx="44" cy="12" r="7" fill="var(--accent)" />
          <rect
            x="10"
            y="38"
            width="44"
            height="18"
            rx="5"
            fill="var(--card)"
            stroke="var(--fg)"
            stroke-width="3.5"
          />
        </svg>
        <span class="wordmark-text">sandbox.watch</span></a
      >
      <nav>
        <a href="/">Compare</a>
        <a href="/log">Update log</a>
        <a href="/about">About</a>
      </nav>
    </header>
    <main>{% block content %}{% endblock %}</main>
    <footer>
      <p>
        Data is researched from public sources and every row cites them. {% if
        repo_url %}<a href="{{ repo_url }}">Source and history</a> ·{% endif %}
        <a href="/about">How this site maintains itself</a>
      </p>
    </footer>
  </body>
</html>
